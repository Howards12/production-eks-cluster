apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp
  template:
    metadata:
      labels:
        app: whatsapp
    spec:
      containers:
      - name: whatsapp-container
        # Pointing exactly to the repository and tag from your screenshot
        image: docker.io/ikonoim/whatsapp:v26.0.5rc1
        ports:
        - containerPort: 80 # Adjust if this specific app listens on a different internal port
---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: whatsapp
  ports:
    - port: 80
      targetPort: 80