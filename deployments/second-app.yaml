apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
      - name: web
        image: docker.io/library/httpd:alpine # Pulls Apache from Docker Hub
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: billing
  ports:
    - port: 80
      targetPort: 80